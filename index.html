<script>
/* ---------------- storage helpers ---------------- */
const FIREBASE_CONFIG = {
  /*
    Paste your Firebase web app config here.
    Firebase Console -> Project settings -> General -> Your apps -> Web app -> SDK setup and configuration -> Config
  */
  apiKey: "AIzaSyD6YnLWI7nGoLTgF69_rPg08GrKfJZiemM",
  authDomain: "exam-portal-4d1d3.firebaseapp.com",
  projectId: "exam-portal-4d1d3",
  storageBucket: "exam-portal-4d1d3.firebasestorage.app",
  messagingSenderId: "307642830509",
  appId: "1:307642830509:web:3938f8fe2f62de084ec024",
  measurementId: "G-ZXTEC9E607"
};
const FIRESTORE_COLLECTION = 'examDesk';
let firestoreDb = null;
let firestoreStatus = 'missing-config';

async function sGetFallback(key, shared){
  if(window.storage && typeof window.storage.get === 'function'){
    const r = await window.storage.get(key, shared);
    return r ? r.value : null;
  }
  return localStorage.getItem(key);
}
async function sSetFallback(key, value, shared){
  if(window.storage && typeof window.storage.set === 'function'){
    return await window.storage.set(key, value, shared);
  }
  localStorage.setItem(key, value);
  return true;
}
function hasFirebaseConfig(){
  return !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.authDomain && FIREBASE_CONFIG.projectId && FIREBASE_CONFIG.appId);
}
function initFirebase(){
  if(!hasFirebaseConfig()){
    firestoreStatus = 'missing-config';
    return false;
  }
  if(!window.firebase || !firebase.initializeApp || !firebase.firestore){
    console.warn('Firebase SDK did not load. Using localStorage fallback.');
    firestoreStatus = 'sdk-missing';
    return false;
  }
  if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  firestoreDb = firebase.firestore();
  firestoreStatus = 'connected';
  return true;
}
async function sGet(key, shared){
  try{
    if(firestoreDb){
      const snap = await firestoreDb.collection(FIRESTORE_COLLECTION).doc(key).get();
      if(snap.exists) return snap.data().value;
      const fallbackValue = await sGetFallback(key, shared);
      if(fallbackValue !== null) await firestoreDb.collection(FIRESTORE_COLLECTION).doc(key).set({
        value: fallbackValue,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      return fallbackValue;
    }
    return await sGetFallback(key, shared);
  }
  catch(e){
    console.error('Firestore read failed. Using empty/local data for this request.', e);
    return null;
  }
}
async function sSet(key, value, shared){
  try{
    if(firestoreDb){
      await firestoreDb.collection(FIRESTORE_COLLECTION).doc(key).set({
        value,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      return true;
    }
    return await sSetFallback(key, value, shared);
  }catch(e){ console.error('Firestore/local save failed.', e); return null; }
}

const DB = { users: [], tests: [], submissions: [] };
let currentUser = null; // {username, name, role}
const VALID_STUDENT_IDS = ['101', '102', '7', '81', '5', '75', '76', '11'];
function normalizeStudentId(id){ return String(id || '').trim(); }
function isValidStudentId(id){ return VALID_STUDENT_IDS.includes(normalizeStudentId(id)); }

async function loadAll(){
  const u = await sGet('users', true);
  const t = await sGet('tests', true);
  const s = await sGet('submissions', true);
  DB.users = u ? JSON.parse(u) : [];
  DB.tests = t ? JSON.parse(t) : [];
  DB.submissions = s ? JSON.parse(s) : [];
}
async function saveUsers(){ await sSet('users', JSON.stringify(DB.users), true); }
async function saveTests(){ await sSet('tests', JSON.stringify(DB.tests), true); }
async function saveSubmissions(){ await sSet('submissions', JSON.stringify(DB.submissions), true); }

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDT(iso){ if(!iso) return '-'; const d = new Date(iso); return d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function testSortTime(t){ return t.availableFrom ? new Date(t.availableFrom).getTime() : 0; }
function testScheduleText(t){
  if(t.availableFrom && t.availableTo) return `${fmtDT(t.availableFrom)} -> ${fmtDT(t.availableTo)}`;
  if(t.availableFrom) return `From ${fmtDT(t.availableFrom)}`;
  if(t.availableTo) return `Until ${fmtDT(t.availableTo)}`;
  return 'Always available';
}
function testWindowStatus(t, now){
  const from = t.availableFrom ? new Date(t.availableFrom) : null;
  const to = t.availableTo ? new Date(t.availableTo) : null;
  if(from && now < from) return 'upcoming';
  if(to && now > to) return 'expired';
  return 'live';
}
function storageStatus(){ return firestoreDb ? 'Firebase Firestore' : 'local browser storage'; }
function firebaseSetupNotice(){
  if(firestoreStatus === 'connected') return '';
  const msg = firestoreStatus === 'sdk-missing'
    ? 'Firebase SDK could not load, so this browser is using local storage.'
    : 'Firebase keys are blank, so this browser is using local storage. Paste your config into FIREBASE_CONFIG in index.html to enable Firestore.';
  return `<div class="info-banner"><b>Firestore not active:</b> ${msg}</div>`;
}

const views = {};

function initHelpWidget(){
  const widget = document.getElementById('helpWidget');
  const toggle = document.getElementById('helpToggle');
  if(!widget || !toggle) return;
  let dragging = false;
  let moved = false;
  let startX = 0, startY = 0, baseX = 0, baseY = 0;
  function clampWidget(){
    const rect = widget.getBoundingClientRect();
    const x = Math.min(Math.max(rect.left, 8), window.innerWidth - rect.width - 8);
    const y = Math.min(Math.max(rect.top, 8), window.innerHeight - rect.height - 8);
    widget.style.left = `${x}px`;
    widget.style.top = `${y}px`;
    widget.style.right = 'auto';
  }
  toggle.addEventListener('pointerdown', e=>{
    dragging = true;
    moved = false;
    startX = e.clientX;
    startY = e.clientY;
    const rect = widget.getBoundingClientRect();
    baseX = rect.left;
    baseY = rect.top;
    toggle.setPointerCapture(e.pointerId);
  });
  toggle.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if(Math.abs(dx) + Math.abs(dy) > 5) moved = true;
    widget.style.left = `${baseX + dx}px`;
    widget.style.top = `${baseY + dy}px`;
    widget.style.right = 'auto';
  });
  toggle.addEventListener('pointerup', e=>{
    if(!dragging) return;
    dragging = false;
    toggle.releasePointerCapture(e.pointerId);
    clampWidget();
    if(!moved) widget.classList.toggle('open');
  });
  window.addEventListener('resize', clampWidget);
}
initHelpWidget();

async function doStudentAuth(){

  if(!id || !name){ authError='Please enter both Student ID and Name.'; render(); return; }

    render();

  let u = DB.users.find(x=>x.username===id && x.role==='student');
  if(!u){

    DB.users.push(u); await saveUsers();
  } else if(u.name !== name){

async function doAuth(){
  const user = document.getElementById('a_user').value.trim();
  const pass = document.getElementById('a_pass').value;
  if(!user || !pass){ authError='Please enter both username and password.'; render(); return; }
  if(authMode==='register'){
    const name = document.getElementById('a_name').value.trim() || user;
    if(DB.users.find(u=>u.username===user)){ authError='This username is already taken.'; render(); return; }
    const u = { username:user, password:pass, role:'teacher', name };
    DB.users.push(u); await saveUsers();
    currentUser = u;
  } else {
    const u = DB.users.find(x=>x.username===user && x.password===pass && x.role==='teacher');
    if(!u){ authError='Incorrect username/password, or account not found.'; render(); return; }
    currentUser = u;
  }

  const type = document.getElementById('q_type').value;

  if(!text){ alert('Please enter the question text.'); return; }
  let q = { id: uid(), type, text, marks };

async function saveGrading(){
  const s = DB.submissions.find(x=>x.id===gradingSubId);
  const t = DB.tests.find(x=>x.id===s.testId);
  const inputs = document.querySelectorAll('.grade_marks');
  s.shortMarks = s.shortMarks || {};
  let ok = true;
  inputs.forEach(inp=>{
    const max = parseInt(inp.dataset.max);
    let v = parseFloat(inp.value);
    if(isNaN(v) || v<0) v=0;
    if(v>max) v=max;
    s.shortMarks[inp.dataset.qid] = v;
  });
  const hasAllShortGraded = t.questions.filter(q=>q.type==='short').every(q=> s.shortMarks[q.id]!==undefined);
  s.needsReview = !hasAllShortGraded;
  const shortTotal = Object.values(s.shortMarks).reduce((a,b)=>a+b,0);
  s.finalScore = s.autoScore + shortTotal;
  await saveSubmissions();
  view='teacherTestDetail'; render();
}

async function requestFrontCamera(){
  cameraError = '';
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    cameraError = 'Camera access is not supported in this browser. Please use the latest Chrome or Edge.';
    return null;
  }
  stopCameraStream();
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: true
    });
    cameraStream = stream;
    armCameraGuards(stream);
    return stream;
  }catch(err){
    cameraError = 'Camera and microphone permission is required. Allow permission and start again.';
    return null;
  }
}
function armCameraGuards(stream){
  stream.getVideoTracks().forEach(track=>{
    track.onended = () => {
      if(examState && examState.active){ terminateExam('Camera turned off or disconnected'); }
    };
    track.onmute = () => {
      if(examState && examState.active){ terminateExam('Camera feed unavailable'); }
    };
  });
  stream.getAudioTracks().forEach(track=>{
    track.onended = () => {
      if(examState && examState.active){ terminateExam('Microphone turned off or disconnected'); }
    };
    track.onmute = () => {
      if(examState && examState.active){ terminateExam('Microphone feed unavailable'); }
    };
  });
}
function attachCameraPreview(){
  const video = document.getElementById('proctorCamera');
  if(!video || !cameraStream) return;
  if(video.srcObject !== cameraStream){ video.srcObject = cameraStream; }
  video.play().catch(()=>{});
  startMotionMonitor(video);
}
function stopCameraStream(){
  stopMotionMonitor();
  if(cameraStream){
    cameraStream.getTracks().forEach(track=>track.stop());
    cameraStream = null;
  }
}

function startMotionMonitor(video){
  if(!video) return;
  if(motionTimer && motionVideo === video) return;
  if(motionTimer){ stopMotionMonitor(); }
  const token = ++motionStartToken;
  motionVideo = video;
  motionCanvas = document.createElement('canvas');
  motionCanvas.width = 160;
  motionCanvas.height = 120;
  if('FaceDetector' in window){
    try{ faceDetector = new FaceDetector({ fastMode:true, maxDetectedFaces:1 }); }catch(e){ faceDetector = null; }
  }
  setTimeout(()=>{
    if(token === motionStartToken && examState && examState.active && view==='studentTest'){
      examState.faceBaseline = null;
      examState.lastFrameData = null;
      motionTimer = setInterval(()=>checkStudentMotion(video), 1300);
    }
  }, 1800);
}
function stopMotionMonitor(){
  motionStartToken++;
  if(motionTimer){ clearInterval(motionTimer); motionTimer = null; }
  if(motionToastTimer){ clearTimeout(motionToastTimer); motionToastTimer = null; }
  const toast = document.getElementById('motionToast');
  if(toast){ toast.remove(); }
  faceDetector = null;
  motionCanvas = null;
  motionVideo = null;
}
async function checkStudentMotion(video){
  if(!examState || !examState.active || !video || video.readyState < 2) return;
  let detected = false;
  if(faceDetector){
    detected = await detectFaceTurn(video).catch(()=>false);
  } else {
    detected = detectFrameMotion(video);
  }
  if(detected){ registerMotionWarning(); }
}
async function detectFaceTurn(video){
  const faces = await faceDetector.detect(video);
  if(!examState || !examState.active) return false;
  if(!faces || !faces.length){ return true; }
  const box = faces[0].boundingBox;
  const frameW = video.videoWidth || 640;
  const centerX = box.x + box.width/2;
  const sample = { centerRatio:centerX/frameW, widthRatio:box.width/frameW, at:Date.now() };
  if(!examState.faceBaseline){
    examState.faceBaseline = sample;
    return false;
  }
  const base = examState.faceBaseline;
  const centerShift = Math.abs(sample.centerRatio - base.centerRatio);
  const widthChange = Math.abs(sample.widthRatio - base.widthRatio);
  return centerShift > 0.17 || widthChange > 0.24;
}
function detectFrameMotion(video){
  if(!motionCanvas) return false;
  const ctx = motionCanvas.getContext('2d', { willReadFrequently:true });
  ctx.drawImage(video, 0, 0, motionCanvas.width, motionCanvas.height);
  const img = ctx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
  const data = img.data;
  const previous = examState.lastFrameData;
  examState.lastFrameData = new Uint8ClampedArray(data);
  if(!previous) return false;
  let diff = 0;
  for(let i=0;i<data.length;i+=16){
    diff += Math.abs(data[i]-previous[i]) + Math.abs(data[i+1]-previous[i+1]) + Math.abs(data[i+2]-previous[i+2]);
  }
  const samples = data.length/16;
  return diff/samples > 42;
}
function registerMotionWarning(){
  if(!examState || !examState.active) return;
  const now = Date.now();
  if(examState.lastMotionAt && now - examState.lastMotionAt < 4500) return;
  examState.lastMotionAt = now;
  examState.motionWarnings = (examState.motionWarnings || 0) + 1;
  if(examState.motionWarnings === 3 && !examState.motionPauseUsed){
    pauseExamForMotion();
    return;
  }
  if(examState.motionWarnings >= 6){
    terminateExam('Motion detected after the 2 extra chances following resume');
    return;
  }
  showMotionToast(examState.motionWarnings);
}
function showMotionToast(count){
  let toast = document.getElementById('motionToast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'motionToast';
    toast.className = 'motion-toast';
    document.body.appendChild(toast);
  }
  if(count <= 3){
    toast.innerHTML = `Motion detected - Warning ${count}/3<span class="muted">Sit upright, keep your face centered, and keep both ears visible. After 3 warnings, the exam will pause.</span>`;
  } else {
    const extra = count - 3;
    const note = extra < 2 ? 'You have 1 extra chance left.' : 'The next motion detection will terminate the exam.';
    toast.innerHTML = `Motion detected - Extra chance ${extra}/2<span class="muted">Only 2 extra chances are allowed after resume. ${note}</span>`;
  }
  if(motionToastTimer){ clearTimeout(motionToastTimer); }
  motionToastTimer = setTimeout(()=>{ const el=document.getElementById('motionToast'); if(el){ el.remove(); } }, 3800);
}
function pauseExamForMotion(){
  if(!examState || !examState.active) return;
  examState.active = false;
  examState.paused = true;
  examState.motionPauseUsed = true;
  examState.pausedRemainingMs = Math.max(0, examState.endAt - Date.now());
  detachExamListeners();
  stopMotionMonitor();
  render();
}
function resumeMotionPausedExam(){
  if(!examState || !examState.paused) return;
  examState.paused = false;
  examState.active = true;
  examState.endAt = Date.now() + Math.max(0, examState.pausedRemainingMs || 0);
  examState.lastMotionAt = 0;
  examState.faceBaseline = null;
  examState.lastFrameData = null;
  render();
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
  if(req) req.call(el).catch(()=>{});
  attachExamListeners();
  tickTimer();
}

async function beginExam(testId){
  const t = DB.tests.find(x=>x.id===testId);
  const stream = await requestFrontCamera();
  if(!stream){ confirmStartTest(testId, true); return; }
  examState = {
    test: t,
    answers: {},
    endAt: Date.now() + t.duration*60000,
    active: false,
    paused: false,
    pausedRemainingMs: 0,
    warnCount: 0,
    motionWarnings: 0,
    motionPauseUsed: false,
    lastMotionAt: 0,
    faceBaseline: null,
    lastFrameData: null,
    submitting: false,
  };
  view='studentTest';
  render();
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
  if(req) req.call(el).catch(()=>{});
  setTimeout(()=>{
    examState.active = true;
    attachExamListeners();
  }, 900);
  tickTimer();
}
function attachExamListeners(){
  detachExamListeners();
  document.addEventListener('visibilitychange', onVisChange);
  window.addEventListener('blur', onWinBlur);
  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('contextmenu', blockEvt, true);
  document.addEventListener('copy', blockEvt, true);
  document.addEventListener('cut', blockEvt, true);
  document.addEventListener('paste', blockEvt, true);
  document.addEventListener('keydown', examKeyBlock, true);
  window.addEventListener('beforeprint', onBeforePrint);
}
function blockEvt(e){ if(examState && examState.active){ e.preventDefault(); } }
function examKeyBlock(e){
  if(!examState || !examState.active) return;
  const k = e.key.toLowerCase();
  const combo = (e.ctrlKey||e.metaKey) && ['c','v','x','u','p','s','a'].includes(k);
  const screenshotCombo = e.key==='PrintScreen' || ((e.metaKey||e.ctrlKey) && e.shiftKey && ['s','3','4','5'].includes(k));
  if(combo || e.key==='F12' || screenshotCombo){ e.preventDefault(); }
  if(screenshotCombo){
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText('').catch(()=>{}); }
    terminateExam('Screenshot attempt detected');
  }
}
function onBeforePrint(e){
  if(!examState || !examState.active) return;
  if(e){ e.preventDefault(); }
  terminateExam('Print/screenshot attempt detected');
}
function onVisChange(){ if(examState && examState.active && document.hidden){ terminateExam('Tab switch / minimize detected'); } }
function onWinBlur(){ if(examState && examState.active){ terminateExam('Window switch detected'); } }
function onFsChange(){
  if(!document.fullscreenElement && examState && examState.active){ terminateExam('Attempt to exit fullscreen detected'); }
}
function detachExamListeners(){
  document.removeEventListener('visibilitychange', onVisChange);
  window.removeEventListener('blur', onWinBlur);
  document.removeEventListener('fullscreenchange', onFsChange);
  document.removeEventListener('contextmenu', blockEvt, true);
  document.removeEventListener('copy', blockEvt, true);
  document.removeEventListener('cut', blockEvt, true);
  document.removeEventListener('paste', blockEvt, true);
  document.removeEventListener('keydown', examKeyBlock, true);
  window.removeEventListener('beforeprint', onBeforePrint);
}

function tickTimer(){
  if(!examState || view!=='studentTest') return;
  const bar = document.getElementById('examTimer');
  if(!bar){ return; }
  const remain = examState.paused ? Math.max(0, examState.pausedRemainingMs || 0) : Math.max(0, examState.endAt - Date.now());
  const mm = Math.floor(remain/60000), ss = Math.floor((remain%60000)/1000);
  bar.textContent = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  bar.className = 'timer' + (remain < 60000 ? ' critical' : '');
  if(!examState.paused && remain<=0){ submitExam(false, 'Time up'); return; }
  requestAnimationFrame(()=>setTimeout(tickTimer,250));
}

views.studentTest = () => {
  const t = examState.test;
  return `
  <div class="exam-bar no-select">
    <div>${esc(t.title)}</div>
    <div class="timer" id="examTimer">--:--</div>
    <div class="seal">Live Proctoring</div>
  </div>
  <div class="camera-tile no-select" aria-label="Front camera preview">
    <video id="proctorCamera" autoplay muted playsinline></video>
    <div class="camera-label"><span>FRONT CAMERA + MIC</span><span class="camera-dot"></span></div>
  </div>
  ${examState.paused ? `
  <div class="overlay no-select"><div class="box">
    <h2 style="color:var(--alert);">Exam Paused</h2>
    <p class="muted">Motion warning 3/3 is complete. You can resume the exam, but after resuming you will get only 2 extra chances. After that, motion detection will terminate the exam.</p>
    <div class="btnbar" style="justify-content:center;">
      <button class="gold" onclick="resumeMotionPausedExam()">Resume Test</button>
    </div>
  </div></div>` : ''}
  <div class="no-select">
  ${t.questions.map((q,i)=>{
    if(q.type==='mcq'){
      return `<div class="qcard"><div class="qhead"><span class="qnum">Q${i+1}.</span><span class="marks-tag">${q.marks} marks</span></div>
      <div style="margin-bottom:10px;">${esc(q.text)}</div>
      ${q.options.map((o,oi)=>`
        <div class="omr-option ${examState.answers[q.id]===oi?'selected':''}" onclick="selectMcq('${q.id}',${oi})">
          <div class="omr-bubble"></div><div>${esc(o)}</div>
        </div>`).join('')}
      </div>`;
    } else {
      return `<div class="qcard"><div class="qhead"><span class="qnum">Q${i+1}.</span><span class="marks-tag">${q.marks} marks</span></div>
      <div style="margin-bottom:10px;">${esc(q.text)}</div>
      <textarea class="student-answer" data-qid="${q.id}" onkeydown="studentAnswerKeydown(event)" onbeforeinput="studentAnswerBeforeInput(event)" onpaste="return false" ondrop="return false" oncopy="return false" oncut="return false" oninput="studentAnswerInput(event)" placeholder="Write your answer here...">${esc(examState.answers[q.id]||'')}</textarea>
      </div>`;
    }
  }).join('')}
  <div class="btnbar"><button class="gold" onclick="confirmSubmit()">Submit Test</button></div>
  </div>
  `;
};
function selectMcq(qid, idx){ examState.answers[qid]=idx; render(); }
function studentAnswerKeydown(e){
  if(!examState || view !== 'studentTest') return;
  lastStudentKeyboardAt = Date.now();
}
function studentAnswerBeforeInput(e){
  if(!examState || view !== 'studentTest') return;
  const inputType = e.inputType || '';
  if(inputType.startsWith('delete') || inputType === 'historyUndo' || inputType === 'historyRedo') return;
  if(inputType.startsWith('insert') && Date.now() - lastStudentKeyboardAt > 900){
    e.preventDefault();
    showVoiceTypingNotice();
  }
}
function studentAnswerInput(e){
  if(!examState || !e.target) return;
  examState.answers[e.target.dataset.qid] = e.target.value;
}
function showVoiceTypingNotice(){
  const now = Date.now();
  if(now - lastVoiceTypingNoticeAt < 1600) return;
  lastVoiceTypingNoticeAt = now;
  let toast = document.getElementById('voiceTypingToast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'voiceTypingToast';
    toast.className = 'motion-toast';
    document.body.appendChild(toast);
  }
  toast.innerHTML = `Voice typing is disabled<span class="muted">Please type answers using the keyboard.</span>`;
  setTimeout(()=>{ const el=document.getElementById('voiceTypingToast'); if(el){ el.remove(); } }, 1400);
}
function confirmSubmit(){
  if(!confirm('Confirm test submission? After submitting, you cannot change your answers.')) return;
  submitExam(true, null);
}

async function submitExam(normal, reason){
  if(!examState || examState.submitting) return;
  examState.submitting = true;
  examState.active = false;
  const micAccess = !!(cameraStream && cameraStream.getAudioTracks().length);
  detachExamListeners();
  stopCameraStream();
  if(document.fullscreenElement){
    (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document).catch(()=>{});
  }
  const t = examState.test;
  let autoScore=0, autoMax=0, hasShort=false;
  t.questions.forEach(q=>{
    if(q.type==='mcq'){ autoMax += q.marks; if(examState.answers[q.id]===q.correct) autoScore += q.marks; }
    else { hasShort = true; }
  });
  const sub = {
    id: uid(), testId: t.id, student: currentUser.username,
    answers: { ...examState.answers },
    autoScore, autoMax, hasShort,
    needsReview: hasShort,
    micAccess,
    status: normal ? 'submitted' : 'terminated',
    terminateReason: normal ? '' : (reason || 'Test terminated'),
    submittedAt: new Date().toISOString(),
  };
  DB.submissions.push(sub);
  await saveSubmissions();
  examState = null;
  if(!normal){
    gradingSubId = sub.id;
    view = 'studentResult';
    render();
  } else {
    gradingSubId = sub.id;
    view = 'studentResult';
    render();
  }
}
function terminateExam(reason){
  if(!examState || !examState.active) return;
  submitExam(false, reason);
}
